name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore kanban-board.sln

      - name: Build solution
        run: dotnet build kanban-board.sln --configuration Release --no-restore


  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build   # ensures build must pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore kanban-board.sln

      - name: Run tests
        run: dotnet test kanban-board.sln --configuration Release --no-build --verbosity normal
